<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>دعوة خاصة - تصميم فاخر</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="watermark" class="watermark">© تم التصميم بواسطة [ M3D TECH ]</div>

    <div class="dashboard" id="dashboard">

      <h2> DASHBOARD </h2>
      <input id="guestInput" placeholder="Name Invite">
      <button onclick="createLink()">Create Link</button>

      <p id="result">Result</p>

      <hr>

      <h3>مدعوين</h3>
      <ul id="guestList"></ul>
    </div>

    <div id="All" class="All">
      <p class="hint">اضغط على الختم لفتح الدعوة 💌</p>

      <div class="envelope-wrapper" id="envelopeWrapper">
        <div class="envelope">
          <div class="flap"></div>
          <div class="front"></div>
          <div class="seal">♛</div>
        </div>

        <div class="card">
          <div class="title">دعوة خطوبة</div>
          <div id="guestName">اهلا بك</div>
          <div class="discreption">بسم الله الرحمن الرحيم</div>

          <div class="names">
            <h2 id="nameBoy">Ahmed</h2>
            <h5>&</h5>
            <h2 id="nameGirl">Sara</h2>
          </div>

          <div id="countdown">22:55:66</div>

          <div class="info">
            <div id="date">
              <img src="img/calendar.png" alt="Date" />
              <p id="dateTime">TIME</p>
            </div>

            <div style="cursor: pointer" id="location">
              <img src="img/location.png" alt="location" />
              <p id="locationName">الموقع</p>
            </div>
          </div>

          <div class="finish">فرحة سعيدة</div>
        </div>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
